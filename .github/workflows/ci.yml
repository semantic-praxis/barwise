name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: barwise

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: barwise/package-lock.json

      - run: npm ci

      - run: npm run build

      - run: npm run --workspace=@barwise/mcp bundle

      - run: npm run publint

      - run: npm run test:coverage

      - run: npm run validate:examples

      - run: npm run lint

      - run: npm run knip

      - run: npm run oxlint

      - run: npm run circular

      - run: npm run fmt:check
