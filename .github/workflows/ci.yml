name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    defaults:
      run:
        working-directory: barwise

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: barwise/package-lock.json

      - run: npm ci

      - run: npm run build

      - run: npm run --workspace=@barwise/mcp bundle

      - run: npm run publint

      - run: npm run test:coverage

      - run: npm run validate:examples

      - run: npm run lint

      - run: npm run knip

      - run: npm run oxlint

      - run: npm run circular

      - run: npm run fmt:check

      # Reports known advisories without gating the build. There is an
      # existing backlog of dependency vulnerabilities (mostly dev deps);
      # dependabot opens PRs to chip away at it. Tighten to a blocking
      # step once the backlog is cleared.
      - run: npm audit --audit-level=high
        continue-on-error: true
