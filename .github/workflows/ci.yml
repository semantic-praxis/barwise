name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    defaults:
      run:
        working-directory: barwise

    steps:
      # fetch-depth: 0 so the docs-only detector below can diff the PR
      # against its base commit.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # A pull request that touches only Markdown or beads tracker data
      # (.beads/, e.g. issues.jsonl) still needs its prose formatting
      # checked (dprint covers .md; it ignores .jsonl), but not build,
      # test, or the linters -- neither Markdown nor tracker data can
      # affect those outcomes. Detect that case and skip the heavy steps.
      # Only applies to pull_request events; pushes to main always run the
      # full pipeline. The job itself always runs, so the required check
      # always reports a result.
      - name: Detect docs-only pull request
        id: changes
        if: github.event_name == 'pull_request'
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          changed="$(git diff --name-only "$base" HEAD)"
          echo "Changed files:"
          echo "$changed"
          if [ -n "$changed" ] && ! printf '%s\n' "$changed" | grep -qvE '\.md$|^\.beads/'; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
            echo "Docs/tracker-only change -- skipping build, test, and lint steps."
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: barwise/package-lock.json

      # npm ci runs unconditionally: dprint (used by fmt:check below) is a
      # dev dependency.
      - run: npm ci

      # fmt:check runs first among the checks: it is the cheapest gate and
      # historically the most common failure, and it needs only npm ci (not
      # the build), so front-loading it fails a misformatted PR in seconds
      # instead of after the build. It always runs -- dprint also formats
      # Markdown, so docs-only PRs are still gated on prose formatting.
      - run: npm run fmt:check

      - run: npm run build
        if: steps.changes.outputs.docs_only != 'true'

      - run: npm run --workspace=@barwise/mcp bundle
        if: steps.changes.outputs.docs_only != 'true'

      - run: npm run --workspace=@barwise/cli bundle
        if: steps.changes.outputs.docs_only != 'true'

      # Smoke-test the standalone CLI bundle so a broken bundle fails CI,
      # not a release.
      - name: Smoke-test CLI bundle
        if: steps.changes.outputs.docs_only != 'true'
        run: node packages/cli/dist/bundle/index.cjs --version

      - run: npm run publint
        if: steps.changes.outputs.docs_only != 'true'

      - run: npm run test:coverage
        if: steps.changes.outputs.docs_only != 'true'

      - run: npm run validate:examples
        if: steps.changes.outputs.docs_only != 'true'

      - run: npm run lint
        if: steps.changes.outputs.docs_only != 'true'

      - run: npm run knip
        if: steps.changes.outputs.docs_only != 'true'

      - run: npm run oxlint
        if: steps.changes.outputs.docs_only != 'true'

      # Architecture conformance gates (docs/specs/architecture-analysis.spec.md).
      # depcruise enforces the one-way dependency graph and acyclicity
      # (S-ORTH-1..4, replacing the former madge check); purity enforces
      # determinism in core (S-DET-1..3). Both are blocking.
      - run: npm run depcruise
        if: steps.changes.outputs.docs_only != 'true'

      - run: npm run purity
        if: steps.changes.outputs.docs_only != 'true'

      # Warn-only architectural smells: large files and code duplication.
      # Advisory signals for the periodic review, never gates (WS6).
      - run: npm run filesize
        if: steps.changes.outputs.docs_only != 'true'
        continue-on-error: true

      - run: npm run dup
        if: steps.changes.outputs.docs_only != 'true'
        continue-on-error: true

      # Reports known advisories without gating the build. There is an
      # existing backlog of dependency vulnerabilities (mostly dev deps);
      # dependabot opens PRs to chip away at it. Tighten to a blocking
      # step once the backlog is cleared.
      - run: npm audit --audit-level=high
        if: steps.changes.outputs.docs_only != 'true'
        continue-on-error: true
