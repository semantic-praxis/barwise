name: Release VSIX

on:
  release:
    types: [published]

jobs:
  vsix:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: barwise

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: barwise/package-lock.json

      - run: npm ci

      - run: npm run build

      - name: Package VSIX
        working-directory: barwise/packages/vscode
        run: npx @vscode/vsce package --no-dependencies

      - name: Upload VSIX to release
        working-directory: barwise/packages/vscode
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" *.vsix --repo "${{ github.repository }}"
