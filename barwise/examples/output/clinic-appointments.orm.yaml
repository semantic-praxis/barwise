orm_version: "1.0"
model:
  name: Clinic Appointments
  object_types:
    - id: 1b115837-7c87-47f8-b034-02876a30edfb
      name: Patient
      kind: entity
      reference_mode: medical_record_number
      definition: A person who receives medical care at the clinic, identified by a medical record number.
    - id: e79c9725-9223-4709-8b5a-a6b2d57ae981
      name: Doctor
      kind: entity
      reference_mode: provider_id
      definition: A medical practitioner at the clinic, identified by a state-issued provider ID.
    - id: ae84de8c-4b9f-4753-89d1-ac177b95fd4d
      name: Appointment
      kind: entity
      reference_mode: confirmation_number
      definition: A scheduled visit between a patient and a doctor, identified by a confirmation number.
    - id: 3369fde5-0602-4aa3-988b-33ccb9e91ca1
      name: ExamRoom
      kind: entity
      reference_mode: room_number
      definition: A physical examination room at the clinic, identified by a room number.
    - id: a9fa5fcf-1c07-4a27-81cb-e08c667b34d5
      name: Specialty
      kind: value
      definition: The medical specialty of a doctor.
      value_constraint:
        values:
          - cardiology
          - dermatology
          - family medicine
          - orthopedics
          - pediatrics
    - id: fe9788a0-8277-4526-aed3-9dce5406130e
      name: AppointmentDate
      kind: value
      definition: The calendar date of an appointment.
    - id: bde116dd-f4a9-4547-976b-c840aa9a0999
      name: TimeSlot
      kind: value
      definition: A half-hour time slot during clinic hours.
      value_constraint:
        values:
          - 8:00
          - 8:30
          - 9:00
          - 9:30
          - 10:00
          - 10:30
          - 11:00
          - 11:30
          - 13:00
          - 13:30
          - 14:00
          - 14:30
          - 15:00
          - 15:30
          - 16:00
          - 16:30
    - id: a4adbf80-e5bc-45a1-b23c-df0ea91f98a2
      name: VisitReason
      kind: value
      definition: Free-text reason for the appointment as described by the patient.
    - id: f720505b-046a-436b-8703-e867ef086883
      name: AppointmentStatus
      kind: value
      definition: The current status of an appointment in its lifecycle.
      value_constraint:
        values:
          - scheduled
          - checked-in
          - in-progress
          - completed
          - cancelled
          - no-show
    - id: d61f5770-66a7-4946-9dd9-46a61c74c939
      name: FollowUpNote
      kind: value
      definition: Free-text follow-up note attached to a completed appointment.
