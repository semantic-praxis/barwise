orm_version: "1.0"
model:
  name: Order Management
  object_types:
    - id: 0c371228-171d-4c8b-9fef-a12358ae401c
      name: Customer
      kind: entity
      reference_mode: customer_id
      definition: A person or organization that places orders in the CRM system.
    - id: ce369736-90d5-4ba0-8a9b-23a1a2d065b3
      name: Order
      kind: entity
      reference_mode: order_number
      definition: A confirmed request by a customer for one or more products.
    - id: 91bbaafa-9d0a-4284-b06e-81909270247f
      name: Product
      kind: entity
      reference_mode: sku
      definition: A product that can be ordered by customers.
    - id: 0a3f4bc5-b1d6-47fb-b7be-018c11ef400c
      name: OrderStatus
      kind: value
      definition: The current status of an order in the fulfillment pipeline.
      value_constraint:
        values:
          - pending
          - confirmed
          - shipped
          - delivered
    - id: 13156648-e22b-4d2c-9108-54bf11aca028
      name: Name
      kind: value
      definition: A customer's display name.
      data_type:
        name: text
        length: 100
