orm_version: "1.0"
model:
  name: University Enrollment
  object_types:
    - id: 631f59fe-24e8-47f8-8647-fa59b848ac20
      name: Student
      kind: entity
      reference_mode: student_number
      definition: A person enrolled at the university, identified by a student number assigned at admission.
    - id: b52527a4-33a5-418b-8e61-d554ba549342
      name: Course
      kind: entity
      reference_mode: course_code
      definition: A catalog entry representing an academic course, identified by a unique course code.
    - id: cf2e6066-a43f-4ede-b3f1-592dd533c0ce
      name: CourseOffering
      kind: entity
      reference_mode: offering_id
      definition: A specific instance of a course offered in a particular semester.
    - id: 26c32005-37c3-4211-a540-8f396759bca2
      name: Instructor
      kind: entity
      reference_mode: employee_id
      definition: A faculty member who teaches course offerings, identified by employee ID.
    - id: c915cdab-d725-4e4d-91d8-d2f2630624c7
      name: Semester
      kind: entity
      reference_mode: term_code
      definition: An academic term during which course offerings take place, identified by a term code.
    - id: 78fc7af3-e41b-4b9d-a29b-c6ca8b5e38d6
      name: Title
      kind: value
      definition: The free-text name of a course.
    - id: 7d17fff6-bb0a-4e95-84e6-152803135dfa
      name: CreditValue
      kind: value
      definition: The number of credits a course is worth, expressed as a whole number.
    - id: 69bd1e48-e683-4c3e-8239-41f3ea2a0419
      name: MaxCapacity
      kind: value
      definition: The maximum number of students that can enroll in a course offering.
    - id: 4f84fb1c-6116-49a6-9a65-3c7b804247b6
      name: StartDate
      kind: value
      definition: The date a semester begins.
    - id: 0771848f-1147-4943-be84-90e08e5cc598
      name: EndDate
      kind: value
      definition: The date a semester ends.
    - id: e6016666-183f-4ead-855c-b5e1a205ba0d
      name: LetterGrade
      kind: value
      definition: A grade awarded to a student upon completion of a course offering.
      value_constraint:
        values:
          - A
          - B
          - C
          - D
          - F
